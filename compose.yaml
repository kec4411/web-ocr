name: web-ocr

services:
  frontend:
    build: ./frontend
    volumes:
      - ./frontend:/usr/src/app
    command: npm start
    ports:
      - "3000:3000"

  backend:
    build: ./backend
    volumes:
      - ./backend/app:/code/app
    environment:
      - OCR_LANG=jpn+eng
      - CORS_ALLOW_ORIGINS=http://localhost:5173
    ports:
      - "9004:9004"
    healthcheck:
      # python:3.12-slim has no curl.
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:9004/health')\""]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 15s
