name: web-ocr

services:
  frontend:
    build: ./frontend
    volumes:
      - ./frontend:/usr/src/app
    command: npm start
    ports:
      - "3000:3000"

  backend:
    build: ./backend
    volumes:
      - ./backend/app:/app
    ports:
      - "9004:9004"
    command: uvicorn main:app --reload --host 0.0.0.0 --port 9004
