name: web-ocr

services:
  frontend:
    build:
      context: ./frontend
      target: dev
    volumes:
      - ./frontend:/app
      # Keeps the image's Linux node_modules from being shadowed by the host's
      # bind mount. Without this, macOS-built binaries end up inside the Linux
      # container. See README (トラブルシューティング) for the stale-volume caveat.
      - frontend_node_modules:/app/node_modules
    environment:
      - VITE_API_BASE_URL=http://localhost:9004
    ports:
      - "5173:5173"
    depends_on:
      backend:
        condition: service_healthy

  backend:
    build: ./backend
    volumes:
      # Whole dir, not just app/: brings tests/ and requirements-dev.txt into
      # the running container without shipping them in the image.
      - ./backend:/code
    environment:
      - OCR_LANG=jpn+eng
      - CORS_ALLOW_ORIGINS=http://localhost:5173
    ports:
      - "9004:9004"
    healthcheck:
      # python:3.12-slim has no curl.
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:9004/health')\""]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 15s

  # Production build served by nginx. Opt in with:
  #   docker compose --profile prod up frontend-prod
  frontend-prod:
    profiles: ["prod"]
    build:
      context: ./frontend
      target: prod
      args:
        VITE_API_BASE_URL: http://localhost:9004
    ports:
      - "8080:80"
    depends_on:
      backend:
        condition: service_healthy

volumes:
  frontend_node_modules:
